<div
    class="flex flex-col md:flex-row-reverse items-start md:items-end w-full max-w-4xl px-4 md:px-0"
>
    <section
        class="w-full md:w-3/4 py-8 md:pt-0 md:pl-10 md:pr-10 font-google-sans"
    <p class="block text-lg font-bold text-gray-700">
        CBGC is built by it's members, please fill out this brief survey so club
        leadership can make sure we're leading the club in alignment with our
        members goals and desires. All submissions are anonymous and will not be seen by anyone but club leadership
    </p>

        <form
            action="https://api.web3forms.com/submit"
            method="POST"
            class="space-y-6"
        >
            <input
                type="hidden"
                name="access_key"
                value="cd0e7b45-9834-4e93-866c-7ecf83b4acdf"
            />
            <input type="hidden" name="from_name" value="CBGC Website" />
            <input
                type="hidden"
                name="subject"
                value="CBGC Membership Survey"
            />

            <input
                type="hidden"
                name="redirect"
                value="https://cornbreadgun.club/thanks.html"
            />

            <!-- Membership Value Scale -->
            <div class="space-y-3">
                <label class="block text-sm font-bold text-gray-700">
                    On a 4-point scale, 1 being the least valuable and 4 being

                    <span class="text-[#668413]">*</span>
                </label>
                <div class="flex flex-wrap gap-6">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input
                            type="radio"
                            name="membership_value"
                            value="1"
                            required
                            class="w-4 h-4 text-[#668413] focus:ring-[#668413] focus:ring-dashed border-2 border-[#668413] bg-transparent"
                        />
                        <span class="text-gray-700">1</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input
                            type="radio"
                            name="membership_value"
                            value="2"
                            required
                            class="w-4 h-4 text-[#668413] focus:ring-[#668413] focus:ring-dashed border-2 border-[#668413] bg-transparent"
                        />
                        <span class="text-gray-700">2</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input
                            type="radio"
                            name="membership_value"
                            value="3"
                            required
                            class="w-4 h-4 text-[#668413] focus:ring-[#668413] focus:ring-dashed border-2 border-[#668413] bg-transparent"
                        />

                        />
