<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Join • Cornbread Community Gun Club</title>

        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://db.onlinewebfonts.com/c/f9106072214d802b808df16a90f07e97?family=BARABARA-FINAL"
            rel="stylesheet"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap"
            rel="stylesheet"
        />
        <style>
            .font-barabara {
                font-family: "BARABARA-FINAL";
            }
            .font-google-sans {
                font-family: "Google Sans Code", monospace;
            }
        </style>

        <link
            rel="icon"
            type="image/png"
            href="/imgs/favicon/favicon-96x96.png"
            sizes="96x96"
        />
        <link
            rel="icon"
            type="image/svg+xml"
            href="/imgs/favicon/favicon.svg"
        />
        <link rel="shortcut icon" href="/imgs/favicon/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/imgs/favicon/apple-touch-icon.png"
        />
        <link rel="manifest" href="/imgs/favicon/site.webmanifest" />
    </head>
    <body
        class="w-full bg-orange-100 flex flex-col flex-wrap items-center md:pl-20 md:pt-20 pb-20"
    >
        <header
            class="flex flex-col md:flex-row items-center px-4 md:px-0 w-full"
        >
            <img src="imgs/logo.png" class="w-64 pt-8" />
            <h1
                class="text-1xl md:inline md:text-5xl text-[#668413] font-barabara pl-10 hidden"
            >
                CORNBREAD COMMUNITY GUN CLUB
            </h1>
        </header>
        <div
            class="flex flex-col md:flex-row-reverse items-center md:items-start"
        >
            <section
                class="w-3/4 pt-8 pb-4 md:pt-0 md:pl-10 md:pr-10 font-google-sans"
            >
                <p>
                    Thanks for expressing interest in Cornbread Community Gun
                    Club, we'll review your answers and be in touch.
                </p>
            </section>
            <img src="imgs/footer.png" class="pt-8 pb-4 md:w-72 md:h-auto" />
        </div>
    </body>
</html>
